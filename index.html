<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>國考上榜跑酷遊戲</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #gameCanvas { background: linear-gradient(to bottom, #87CEEB, #f0f9ff); display: block; margin: 0 auto; border-bottom: 10px solid #5d4037; }
        .ui-layer { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; }
    </style>
</head>
<body class="bg-gray-100">

    <div class="ui-layer">
        <h1 class="text-2xl font-bold text-blue-900 shadow-sm">🏃 衝吧！國考上榜路</h1>
        <p class="text-sm text-gray-600">空白鍵 (Space) 或 點擊畫面：跳躍</p>
        <div id="score" class="text-3xl font-black text-orange-600 mt-2">分數: 0</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="gameOver" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl text-center shadow-2xl">
            <h2 class="text-4xl font-bold text-red-600 mb-4">挑戰失敗！</h2>
            <p id="finalScore" class="text-xl mb-6 text-gray-700 font-medium"></p>
            <p class="text-gray-500 mb-6 italic text-sm">「壓力太大了嗎？別怕，找對方法你就能過關！」</p>
            <button onclick="resetGame()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full text-lg transition-transform hover:scale-105 cursor-pointer">
                重新挑戰
            </button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const gameOverScreen = document.getElementById('gameOver');
    const finalScoreElement = document.getElementById('finalScore');

    // 遊戲參數
    canvas.width = window.innerWidth;
    canvas.height = 400;

    let score = 0;
    let gameActive = true;
    let gameSpeed = 5;
    let gravity = 0.8;
    
    // 考生 (玩家)
    const player = {
        x: 50,
        y: 300,
        width: 40,
        height: 60,
        dy: 0,
        jumpForce: -15,
        grounded: false,
        color: '#2563eb'
    };

    // 障礙物 (代表國考壓力)
    const obstacles = [];
    const obstacleTypes = [
        { text: "法條", color: "#dc2626" },
        { text: "熬夜", color: "#4b5563" },
        { text: "落榜壓力", color: "#991b1b" }
    ];

    function spawnObstacle() {
        if (!gameActive) return;
        const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
        obstacles.push({
            x: canvas.width,
            y: canvas.height - 50,
            width: 80,
            height: 40,
            text: type.text,
            color: type.color
        });
        
        // 隨機生成下一個障礙物的時間 (1.5秒 - 3秒)
        setTimeout(spawnObstacle, Math.random() * 1500 + 1000);
    }

    function update() {
        if (!gameActive) return;

        // 物理力：跳躍與重力
        player.dy += gravity;
        player.y += player.dy;

        // 落地檢測
        if (player.y + player.height > canvas.height) {
            player.y = canvas.height - player.height;
            player.dy = 0;
            player.grounded = true;
        }

        // 移動障礙物
        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].x -= gameSpeed;

            // 碰撞檢測
            if (
                player.x < obstacles[i].x + obstacles[i].width &&
                player.x + player.width > obstacles[i].x &&
                player.y < obstacles[i].y + obstacles[i].height &&
                player.y + player.height > obstacles[i].y
            ) {
                endGame();
            }

            // 移除出鏡障礙物並加分
            if (obstacles[i].x + obstacles[i].width < 0) {
                obstacles.splice(i, 1);
                score += 10;
                scoreElement.innerText = `分數: ${score}`;
                if (score % 50 === 0) gameSpeed += 0.5; // 難度緩慢增加
            }
        }

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 畫地平線
        ctx.strokeStyle = "#5d4037";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, canvas.height);
        ctx.lineTo(canvas.width, canvas.height);
        ctx.stroke();

        // 畫考生 (簡化版：藍色小人)
        ctx.fillStyle = player.color;
        // 身體
        ctx.fillRect(player.x, player.y, player.width, player.height);
        // 頭部
        ctx.beginPath();
        ctx.arc(player.x + player.width/2, player.y - 10, 15, 0, Math.PI * 2);
        ctx.fill();
        // 眼睛
        ctx.fillStyle = "white";
        ctx.fillRect(player.x + 25, player.y - 15, 5, 5);

        // 畫障礙物
        obstacles.forEach(ob => {
            ctx.fillStyle = ob.color;
            ctx.fillRect(ob.x, ob.y, ob.width, ob.height);
            ctx.fillStyle = "white";
            ctx.font = "14px Arial";
            ctx.fillText(ob.text, ob.x + 10, ob.y + 25);
        });
    }

    function jump() {
        if (player.grounded) {
            player.dy = player.jumpForce;
            player.grounded = false;
        }
    }

    function endGame() {
        gameActive = false;
        gameOverScreen.classList.remove('hidden');
        finalScoreElement.innerText = `最終上榜指數: ${score}`;
    }

    function resetGame() {
        score = 0;
        gameSpeed = 5;
        obstacles.length = 0;
        gameActive = true;
        player.y = 300;
        scoreElement.innerText = `分數: 0`;
        gameOverScreen.classList.add('hidden');
        update();
    }

    // 控制監聽
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') jump();
    });

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        jump();
    });

    canvas.addEventListener('mousedown', jump);

    // 啟動遊戲
    spawnObstacle();
    update();
</script>
</body>
</html>
