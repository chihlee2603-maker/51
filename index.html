<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WePlay 模擬器 - 能量大戰</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .weplay-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .cell-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        canvas { touch-action: none; }
    </style>
</head>
<body class="bg-[#F8F9FD] min-h-screen">

    <div class="weplay-gradient text-white p-4 flex justify-between items-center shadow-lg rounded-b-3xl">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-white rounded-full border-2 border-amber-400 overflow-hidden shadow-inner">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Player">
            </div>
            <div>
                <p class="text-xs opacity-80">房間號碼</p>
                <p class="font-black text-lg">#2026_WIN</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button class="bg-white/20 p-2 rounded-full"><i data-lucide="mic"></i></button>
            <button class="bg-white/20 p-2 rounded-full"><i data-lucide="settings"></i></button>
        </div>
    </div>

    <main class="max-w-md mx-auto p-4 mt-4">
        
        <div class="flex justify-between mb-6">
            <div id="p1-card" class="bg-white p-4 rounded-2xl shadow-md border-b-4 border-blue-500 w-[45%] text-center transition-all">
                <div class="text-blue-600 mb-1"><i data-lucide="user" class="mx-auto"></i></div>
                <p class="font-bold">玩家 1</p>
                <p class="text-xs text-gray-400">正在思考...</p>
            </div>
            <div class="flex items-center text-gray-300 font-black italic text-2xl">VS</div>
            <div id="p2-card" class="bg-white p-4 rounded-2xl shadow-md border-b-4 border-gray-200 w-[45%] text-center transition-all opacity-50">
                <div class="text-red-600 mb-1"><i data-lucide="user" class="mx-auto"></i></div>
                <p class="font-bold">玩家 2</p>
                <p class="text-xs text-gray-400">等待中</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl p-4 shadow-2xl relative border-4 border-white">
            <canvas id="gameBoard" class="mx-auto rounded-xl bg-gray-50"></canvas>
            
            <div id="start-overlay" class="absolute inset-0 bg-black/60 rounded-3xl flex flex-col items-center justify-center text-white p-6 text-center z-10">
                <h2 class="text-3xl font-black mb-4">能量爆裂戰</h2>
                <p class="mb-6 opacity-90">點擊空格增加能量，滿了就會向四周爆裂！佔領所有格子來獲勝。</p>
                <button onclick="startGame()" class="bg-amber-400 text-amber-900 font-black px-10 py-4 rounded-full text-xl shadow-lg hover:scale-105 active:scale-95 transition-all">
                    準備好了！
                </button>
            </div>
        </div>

        <div class="mt-8 flex justify-around">
            <button class="flex flex-col items-center gap-1 text-gray-400">
                <div class="bg-white p-4 rounded-full shadow-md"><i data-lucide="message-square"></i></div>
                <span class="text-xs font-bold">聊天</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-gray-400">
                <div class="bg-white p-4 rounded-full shadow-md"><i data-lucide="smile"></i></div>
                <span class="text-xs font-bold">表情</span>
            </button>
            <button onclick="resetGame()" class="flex flex-col items-center gap-1 text-gray-400">
                <div class="bg-white p-4 rounded-full shadow-md"><i data-lucide="refresh-cw"></i></div>
                <span class="text-xs font-bold">重開</span>
            </button>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('gameBoard');
        const ctx = canvas.getContext('2d');
        const rows = 6;
        const cols = 5;
        const cellSize = 60;
        
        canvas.width = cols * cellSize;
        canvas.height = rows * cellSize;

        let currentPlayer = 1;
        let board = [];
        let isExploding = false;

        // 初始化棋盤
        function initBoard() {
            board = [];
            for (let r = 0; r < rows; r++) {
                board[r] = [];
                for (let c = 0; c < cols; c++) {
                    let threshold = 4;
                    if ((r === 0 || r === rows - 1) && (c === 0 || c === cols - 1)) threshold = 2; // 角落
                    else if (r === 0 || r === rows - 1 || c === 0 || c === cols - 1) threshold = 3; // 邊緣
                    board[r][c] = { count: 0, player: 0, threshold: threshold };
                }
            }
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = board[r][c];
                    const x = c * cellSize;
                    const y = r * cellSize;

                    // 畫格子背景
                    ctx.strokeStyle = '#E5E7EB';
                    ctx.strokeRect(x, y, cellSize, cellSize);

                    if (cell.count > 0) {
                        ctx.fillStyle = cell.player === 1 ? '#3B82F6' : '#EF4444';
                        
                        // 繪製能量球 (根據數量分布)
                        const radius = 8;
                        const centerX = x + cellSize / 2;
                        const centerY = y + cellSize / 2;

                        if (cell.count === 1) {
                            ctx.beginPath(); ctx.arc(centerX, centerY, radius, 0, Math.PI*2); ctx.fill();
                        } else if (cell.count === 2) {
                            ctx.beginPath(); ctx.arc(centerX-12, centerY, radius, 0, Math.PI*2); ctx.fill();
                            ctx.beginPath(); ctx.arc(centerX+12, centerY, radius, 0, Math.PI*2); ctx.fill();
                        } else if (cell.count === 3) {
                            ctx.beginPath(); ctx.arc(centerX, centerY-10, radius, 0, Math.PI*2); ctx.fill();
                            ctx.beginPath(); ctx.arc(centerX-12, centerY+10, radius, 0, Math.PI*2); ctx.fill();
                            ctx.beginPath(); ctx.arc(centerX+12, centerY+10, radius, 0, Math.PI*2); ctx.fill();
                        }
                    }
                }
            }
        }

        canvas.addEventListener('click', (e) => {
            if (isExploding) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const c = Math.floor(x / cellSize);
            const r = Math.floor(y / cellSize);

            if (board[r][c].player === 0 || board[r][c].player === currentPlayer) {
                addAtom(r, c);
                switchPlayer();
            }
        });

        async function addAtom(r, c) {
            isExploding = true;
            board[r][c].count++;
            board[r][c].player = currentPlayer;

            if (board[r][c].count >= board[r][c].threshold) {
                await explode(r, c);
            }
            
            draw();
            isExploding = false;
            checkWinner();
        }

        async function explode(r, c) {
            board[r][c].count = 0;
            board[r][c].player = 0;
            draw();

            const neighbors = [[r-1, c], [r+1, c], [r, c-1], [r, c+1]];
            const promises = [];

            for (const [nr, nc] of neighbors) {
                if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
                    board[nr][nc].player = currentPlayer;
                    board[nr][nc].count++;
                    if (board[nr][nc].count >= board[nr][nc].threshold) {
                        promises.push(new Promise(res => setTimeout(() => res(explode(nr, nc)), 150)));
                    }
                }
            }
            await Promise.all(promises);
            draw();
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            document.getElementById('p1-card').classList.toggle('opacity-50', currentPlayer === 2);
            document.getElementById('p1-card').classList.toggle('border-blue-500', currentPlayer === 1);
            document.getElementById('p1-card').classList.toggle('border-gray-200', currentPlayer === 2);
            
            document.getElementById('p2-card').classList.toggle('opacity-50', currentPlayer === 1);
            document.getElementById('p2-card').classList.toggle('border-red-500', currentPlayer === 2);
            document.getElementById('p2-card').classList.toggle('border-gray-200', currentPlayer === 1);
        }

        function startGame() {
            document.getElementById('start-overlay').classList.add('hidden');
            initBoard();
        }

        function resetGame() {
            initBoard();
            currentPlayer = 1;
            document.getElementById('p1-card').classList.remove('opacity-50');
            document.getElementById('p2-card').classList.add('opacity-50');
        }

        function checkWinner() {
            let p1 = 0, p2 = 0, total = 0;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (board[r][c].player === 1) p1++;
                    if (board[r][c].player === 2) p2++;
                    total += board[r][c].count;
                }
            }
            // 只有在棋盤上累積一定能量後才判斷輸贏
            if (total > 2) {
                if (p1 === 0) alert("玩家 2 獲勝！");
                else if (p2 === 0) alert("玩家 1 獲勝！");
            }
        }

        lucide.createIcons();
        initBoard();
    </script>
</body>
</html>
